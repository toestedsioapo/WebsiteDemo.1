<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jepoy's Grill & Restaurant — Tacloban City</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ember: #C84B11;
    --ember-light: #F4EAE0;
    --ember-dark: #8B300A;
    --charcoal: #1C1A18;
    --smoke: #4A4540;
    --cream: #FAF6F0;
    --gold: #D4892A;
    --gold-light: #F5E6C8;
    --white: #FFFFFF;
    --text-muted: #7A7068;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(28,26,24,0.96);
    backdrop-filter: blur(10px);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: var(--gold); letter-spacing: 0.04em;
  }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    text-decoration: none; color: #c9c4bc;
    font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 400; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta {
    background: var(--ember); color: white;
    padding: 0.55rem 1.4rem; border-radius: 2px;
    font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500; text-decoration: none; transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--ember-dark); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    background: var(--charcoal);
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 70% 50%, #3A2010 0%, #1C1A18 60%);
  }
  .hero-pattern {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
    background-size: 20px 20px;
  }
  .hero-flame {
    position: absolute; right: 8%; top: 50%; transform: translateY(-50%);
    width: 420px; height: 420px; border-radius: 50%;
    background: radial-gradient(circle at 40% 60%, #E8640A 0%, #C84B11 35%, #8B300A 65%, transparent 80%);
    filter: blur(40px); opacity: 0.55;
    animation: flicker 4s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.55; transform: translateY(-50%) scale(1); }
    50% { opacity: 0.7; transform: translateY(-50%) scale(1.05); }
  }
  .hero-content {
    position: relative; z-index: 2; padding: 0 4rem; max-width: 700px;
    animation: fadeUp 1s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero-eyebrow {
    font-size: 0.78rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-bottom: 1.2rem;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 6vw, 5rem);
    color: var(--white); line-height: 1.05; margin-bottom: 1.5rem;
  }
  .hero h1 em { color: var(--gold); font-style: italic; }
  .hero-sub {
    font-size: 1.05rem; color: #b0aaa3; line-height: 1.7;
    max-width: 480px; margin-bottom: 2.5rem;
  }
  .hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    background: var(--ember); color: white;
    padding: 0.9rem 2.2rem; border-radius: 2px;
    font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500; text-decoration: none; transition: background 0.2s;
    display: inline-block;
  }
  .btn-primary:hover { background: var(--ember-dark); }
  .btn-outline {
    border: 1px solid rgba(212,137,42,0.5); color: var(--gold);
    padding: 0.9rem 2.2rem; border-radius: 2px;
    font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500; text-decoration: none; transition: all 0.2s;
    display: inline-block;
  }
  .btn-outline:hover { background: rgba(212,137,42,0.1); border-color: var(--gold); }
  .hero-badges {
    position: absolute; bottom: 3rem; left: 4rem; right: 4rem;
    display: flex; gap: 3rem; z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.08); padding-top: 2rem;
    animation: fadeUp 1s 0.4s ease both; opacity: 0;
  }
  .badge-item { }
  .badge-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; color: var(--gold); font-weight: 700;
  }
  .badge-label { font-size: 0.78rem; color: #787068; letter-spacing: 0.08em; text-transform: uppercase; }

  /* ABOUT */
  .about {
    display: grid; grid-template-columns: 1fr 1fr;
    min-height: 70vh;
  }
  .about-visual {
    background: var(--charcoal);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .about-visual-inner {
    width: 100%; height: 100%; min-height: 400px;
    background: linear-gradient(135deg, #2A1A0E 0%, #3D2010 50%, #1C1A18 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1.5rem;
    font-family: 'Playfair Display', serif;
  }
  .grill-art {
    font-size: 5rem; line-height: 1;
    filter: drop-shadow(0 0 30px rgba(200,75,17,0.6));
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(200,75,17,0.5)); }
    50% { filter: drop-shadow(0 0 50px rgba(200,75,17,0.9)); }
  }
  .grill-tagline {
    font-family: 'Playfair Display', serif; font-style: italic;
    color: var(--gold); font-size: 1.1rem; letter-spacing: 0.05em;
  }
  .about-copy {
    padding: 5rem 4rem;
    background: var(--cream);
    display: flex; flex-direction: column; justify-content: center;
  }
  .section-label {
    font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--ember); font-weight: 500; margin-bottom: 1rem;
  }
  .about-copy h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 3vw, 2.8rem); line-height: 1.2;
    margin-bottom: 1.5rem; color: var(--charcoal);
  }
  .about-copy p {
    font-size: 1rem; color: var(--smoke); line-height: 1.75;
    margin-bottom: 1.2rem;
  }
  .info-chips { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 2rem; }
  .chip {
    background: var(--ember-light); color: var(--ember-dark);
    padding: 0.45rem 1rem; border-radius: 2px;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em;
  }
  .chip.gold { background: var(--gold-light); color: #6B4410; }

  /* MENU SECTION */
  .menu-section {
    padding: 6rem 4rem;
    background: var(--charcoal);
  }
  .section-header { text-align: center; margin-bottom: 4rem; }
  .section-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3rem); color: var(--white);
    margin-bottom: 0.75rem;
  }
  .section-header p { color: #7a7068; font-size: 1rem; }
  .menu-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem; max-width: 1100px; margin: 0 auto;
  }
  .menu-card {
    background: #252220;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden;
    transition: transform 0.3s, border-color 0.3s;
  }
  .menu-card:hover { transform: translateY(-4px); border-color: rgba(200,75,17,0.4); }
  .menu-card-img {
    height: 160px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    background: linear-gradient(135deg, #2D1A0A, #3D2015);
  }
  .menu-card-body { padding: 1.25rem 1.5rem; }
  .menu-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; color: var(--white); margin-bottom: 0.4rem;
  }
  .menu-card-desc { font-size: 0.83rem; color: #7a7068; line-height: 1.6; margin-bottom: 1rem; }
  .menu-card-price { font-size: 1rem; color: var(--gold); font-weight: 500; }
  .menu-cat {
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ember); margin-bottom: 0.3rem; font-weight: 500;
  }

  /* EXPERIENCE / FEATURES */
  .experience { padding: 6rem 4rem; background: var(--cream); }
  .exp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem; max-width: 1000px; margin: 4rem auto 0; }
  .exp-item { text-align: center; }
  .exp-icon {
    width: 64px; height: 64px; margin: 0 auto 1.5rem;
    background: var(--ember-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
  }
  .exp-item h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; margin-bottom: 0.6rem; color: var(--charcoal);
  }
  .exp-item p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }

  /* REVIEWS */
  .reviews { padding: 6rem 4rem; background: #211F1C; }
  .reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; max-width: 1000px; margin: 4rem auto 0; }
  .review-card {
    background: #2A2825;
    border: 1px solid rgba(255,255,255,0.06); border-radius: 3px;
    padding: 1.8rem;
  }
  .stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 1rem; letter-spacing: 2px; }
  .review-text { font-size: 0.95rem; color: #b0aaa3; line-height: 1.7; margin-bottom: 1.5rem; font-style: italic; }
  .reviewer { font-size: 0.82rem; color: #5a5550; font-weight: 500; letter-spacing: 0.05em; }

  /* VISIT */
  .visit {
    display: grid; grid-template-columns: 1fr 1fr;
    min-height: 500px;
  }
  .visit-map {
    background: #1C1A18;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    padding: 4rem;
  }
  .map-pin { font-size: 3rem; }
  .map-address {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: var(--gold); text-align: center;
  }
  .map-address span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: #7a7068; font-style: normal; margin-top: 0.3rem; }
  .visit-info {
    background: var(--ember); padding: 5rem 4rem;
    display: flex; flex-direction: column; justify-content: center;
  }
  .visit-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem; color: white; margin-bottom: 2.5rem; line-height: 1.2;
  }
  .info-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: flex-start; }
  .info-icon { font-size: 1.2rem; margin-top: 2px; }
  .info-content h4 { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 0.2rem; }
  .info-content p { font-size: 1rem; color: white; font-weight: 400; }
  .visit-cta {
    margin-top: 2rem; display: inline-block;
    background: white; color: var(--ember-dark);
    padding: 0.9rem 2rem; border-radius: 2px;
    font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500; text-decoration: none; transition: opacity 0.2s;
    width: fit-content;
  }
  .visit-cta:hover { opacity: 0.9; }

  /* FOOTER */
  footer {
    background: var(--charcoal); padding: 3rem 4rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; color: var(--gold);
  }
  .footer-logo span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: #5a5550; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; }
  .footer-links { display: flex; gap: 2rem; list-style: none; }
  .footer-links a { text-decoration: none; color: #5a5550; font-size: 0.82rem; transition: color 0.2s; }
  .footer-links a:hover { color: var(--gold); }
  .footer-copy { font-size: 0.78rem; color: #3a3835; }

  /* DIVIDER */
  .divider {
    height: 4px;
    background: linear-gradient(90deg, var(--ember-dark), var(--ember), var(--gold), var(--ember), var(--ember-dark));
  }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .hero-content { padding: 0 1.5rem; }
    .hero-badges { left: 1.5rem; right: 1.5rem; gap: 1.5rem; }
    .about { grid-template-columns: 1fr; }
    .about-copy { padding: 3rem 1.5rem; }
    .menu-section, .experience, .reviews { padding: 4rem 1.5rem; }
    .exp-grid { grid-template-columns: 1fr; gap: 2rem; }
    .visit { grid-template-columns: 1fr; }
    .visit-info { padding: 3rem 1.5rem; }
    footer { padding: 2rem 1.5rem; flex-direction: column; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Jepoy's Grill</div>
  <ul class="nav-links">
    <li><a href="#about">Our Story</a></li>
    <li><a href="#menu">Menu</a></li>
    <li><a href="#reviews">Reviews</a></li>
    <li><a href="#visit">Visit Us</a></li>
  </ul>
  <a href="tel:09171427647" class="nav-cta">Call Us</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-pattern"></div>
  <div class="hero-flame"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Since Day One · Tacloban City, Leyte</p>
    <h1>Fire-Grilled<br><em>Filipino Flavors</em><br>Worth Savoring</h1>
    <p class="hero-sub">From slow-charred liempo to sizzling inihaw na bangus — Jepoy's Grill is where family meals and heartwarming food come together under one roof.</p>
    <div class="hero-buttons">
      <a href="#menu" class="btn-primary">Explore Our Menu</a>
      <a href="#visit" class="btn-outline">Find Us</a>
    </div>
  </div>
  <div class="hero-badges">
    <div class="badge-item">
      <div class="badge-num">4.5★</div>
      <div class="badge-label">Google Rating</div>
    </div>
    <div class="badge-item">
      <div class="badge-num">165+</div>
      <div class="badge-label">Happy Reviews</div>
    </div>
    <div class="badge-item">
      <div class="badge-num">₱500</div>
      <div class="badge-label">Max Per Person</div>
    </div>
    <div class="badge-item">
      <div class="badge-num">10 AM</div>
      <div class="badge-label">Opens Daily</div>
    </div>
  </div>
</section>

<div class="divider"></div>

<!-- ABOUT -->
<section class="about" id="about">
  <div class="about-visual">
    <div class="about-visual-inner">
      <div class="grill-art">🔥</div>
      <p class="grill-tagline">"Every meal tells a story."</p>
    </div>
  </div>
  <div class="about-copy">
    <p class="section-label">Our Story</p>
    <h2>Grilled with Heart,<br>Served with Pride</h2>
    <p>Jepoy's Grill and Restaurant has built its reputation on one simple belief: good food should be accessible to everyone. Nestled in Tacloban City, we bring the authentic taste of Filipino grilling — smoky, bold, and deeply satisfying.</p>
    <p>Whether you're sharing a family meal on a Sunday afternoon or grabbing a quick lunch, we serve every plate with the same care and love we put into our craft.</p>
    <div class="info-chips">
      <span class="chip">🍽 Dine-in Available</span>
      <span class="chip">📦 Takeout Ready</span>
      <span class="chip gold">👨‍👩‍👧 Family Friendly</span>
      <span class="chip gold">💰 Budget-Friendly</span>
    </div>
  </div>
</section>

<!-- MENU -->
<section class="menu-section" id="menu">
  <div class="section-header">
    <p class="section-label" style="color: var(--ember);">What We Serve</p>
    <h2>Our Signature Dishes</h2>
    <p>Fresh ingredients, open flames, and Filipino soul.</p>
  </div>
  <div class="menu-grid">
    <div class="menu-card">
      <div class="menu-card-img">🐷</div>
      <div class="menu-card-body">
        <p class="menu-cat">Grill Favorites</p>
        <h3 class="menu-card-name">Inihaw na Liempo</h3>
        <p class="menu-card-desc">Marinated pork belly slow-grilled over hot charcoal. Served with spiced vinegar dip and steamed rice.</p>
        <p class="menu-card-price">₱120 – ₱180</p>
      </div>
    </div>
    <div class="menu-card">
      <div class="menu-card-img">🐟</div>
      <div class="menu-card-body">
        <p class="menu-cat">Seafood</p>
        <h3 class="menu-card-name">Inihaw na Bangus</h3>
        <p class="menu-card-desc">Milkfish stuffed with tomato and onion, grilled to perfection. A Pinoy classic done right.</p>
        <p class="menu-card-price">₱100 – ₱160</p>
      </div>
    </div>
    <div class="menu-card">
      <div class="menu-card-img">🍗</div>
      <div class="menu-card-body">
        <p class="menu-cat">Grill Favorites</p>
        <h3 class="menu-card-name">BBQ Chicken</h3>
        <p class="menu-card-desc">Quarter or half chicken in our signature sweet-savory BBQ glaze, charred on an open grill.</p>
        <p class="menu-card-price">₱90 – ₱160</p>
      </div>
    </div>
    <div class="menu-card">
      <div class="menu-card-img">🍲</div>
      <div class="menu-card-body">
        <p class="menu-cat">House Specials</p>
        <h3 class="menu-card-name">Sinigang na Baboy</h3>
        <p class="menu-card-desc">Hearty pork sinigang in tamarind broth, loaded with fresh vegetables. A soul-warming bowl.</p>
        <p class="menu-card-price">₱130 – ₱200</p>
      </div>
    </div>
    <div class="menu-card">
      <div class="menu-card-img">🥩</div>
      <div class="menu-card-body">
        <p class="menu-cat">Grill Favorites</p>
        <h3 class="menu-card-name">Pork Isaw & Betamax</h3>
        <p class="menu-card-desc">Street-style grilled isaw and betamax on sticks, brushed with smoky glaze and served with sukang sili.</p>
        <p class="menu-card-price">₱15 – ₱50</p>
      </div>
    </div>
    <div class="menu-card">
      <div class="menu-card-img">🍚</div>
      <div class="menu-card-body">
        <p class="menu-cat">Sides & Meals</p>
        <h3 class="menu-card-name">Sinangag Combo</h3>
        <p class="menu-card-desc">Garlic fried rice paired with your choice of grilled protein. Budget-friendly and filling.</p>
        <p class="menu-card-price">₱80 – ₱120</p>
      </div>
    </div>
  </div>
</section>

<!-- EXPERIENCE -->
<section class="experience" id="experience">
  <div class="section-header" style="color: var(--charcoal);">
    <p class="section-label">Why Choose Us</p>
    <h2 style="color: var(--charcoal);">The Jepoy's Difference</h2>
    <p style="color: var(--text-muted);">More than a meal — it's an experience.</p>
  </div>
  <div class="exp-grid">
    <div class="exp-item">
      <div class="exp-icon">🔥</div>
      <h3>Real Charcoal Grilling</h3>
      <p>We use traditional charcoal methods for that authentic smoky flavor you can't fake with a gas stove.</p>
    </div>
    <div class="exp-item">
      <div class="exp-icon">💰</div>
      <h3>Honest Pricing</h3>
      <p>Great food doesn't have to break the bank. Everything on our menu is priced for everyday Filipinos.</p>
    </div>
    <div class="exp-item">
      <div class="exp-icon">👨‍👩‍👧‍👦</div>
      <h3>Family Atmosphere</h3>
      <p>From kids to lolo and lola — our restaurant is a place where every generation feels welcome and at home.</p>
    </div>
  </div>
</section>

<!-- REVIEWS -->
<section class="reviews" id="reviews">
  <div class="section-header">
    <p class="section-label" style="color: var(--ember);">What Guests Say</p>
    <h2>Loved by Taclobanons</h2>
    <p>4.5 stars across 165+ Google reviews.</p>
  </div>
  <div class="reviews-grid">
    <div class="review-card">
      <div class="stars">★★★★★</div>
      <p class="review-text">"Grabe ang sarap ng liempo nila! Sulit na sulit sa presyo. Definitely coming back with the whole family next weekend."</p>
      <p class="reviewer">— Maria S., Local Guide</p>
    </div>
    <div class="review-card">
      <div class="stars">★★★★★</div>
      <p class="review-text">"Best inihaw in Tacloban. The bangus is perfectly grilled — not dry, not undercooked. Friendly staff too. Highly recommended!"</p>
      <p class="reviewer">— Rodel T., Google Review</p>
    </div>
    <div class="review-card">
      <div class="stars">★★★★☆</div>
      <p class="review-text">"Great food for the price. We ordered BBQ chicken and pork ribs. Serving is generous. Good place for family lunch."</p>
      <p class="reviewer">— Analiza B., Google Review</p>
    </div>
  </div>
</section>

<!-- VISIT -->
